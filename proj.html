<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Days Lived Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="project_container">
        <h2 class="main_heading">Days Lived Calculator</h2>
        <p class="prompt_para">Enter your date of birth</p>
        <input type="date" class="date_input" id="dob_input">
        <button class="fetch_result" onclick="calculateDate()">Calculate</button>
        <div class="result-text" id="result"></div>
    </div>

    <script>
        function calculateDate() {
            const dob = document.getElementById('dob_input').value;
            console.log(dob);
            if (!dob) {
                document.getElementById('result').innerText = "Please select a date";
                return;
            }

            const dobobj = new Date(dob);
            const today = new Date();
            console.log(dobobj);
            console.log(today);
            const datediff = Math.abs(today - dobobj);
            console.log(datediff);
            document.getElementById('result').innerText = Math.floor(datediff / (1000 * 60 * 60 * 24)) + " days lived";
        }
    </script>
</body>
</html>
